<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Commune TCG</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono:wght@700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet"><style>
:root{--bg:#090c1d;--panel:#171a2d;--panel2:#26293c;--text:#dfe1fa;--muted:#aeb2cc;--line:rgba(255,255,255,.12);--gold:#e9c349}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 15% 0,rgba(233,195,73,.12),transparent 28%),#070a18;color:var(--text);font-family:Inter,sans-serif}.frame{min-height:100vh;border:10px solid #aeb6c8;border-radius:34px;overflow:hidden;background:#0f1224}.top{height:72px;display:flex;align-items:center;gap:26px;padding:0 24px;background:#111426;border-bottom:1px solid var(--line)}.brand{font:800 2rem Sora;letter-spacing:-.06em;background:0;border:0;color:var(--text)}.tabs{display:flex;gap:22px;margin:auto}.tabs button{background:0;border:0;color:var(--text);font-weight:800;padding:25px 0 21px;border-bottom:2px solid transparent}.tabs .on{color:var(--gold);border-color:var(--gold)}.search{height:42px;width:230px;border:1px solid var(--line);border-radius:10px;background:#101326;color:var(--text);padding:0 14px}.layout{display:grid;grid-template-columns:250px 1fr;min-height:calc(100vh - 72px)}aside{padding:24px 16px;background:#171a2d;border-right:1px solid var(--line);display:flex;flex-direction:column;gap:18px}.rank{font:800 1.1rem Sora}.rank small{display:block;font:800 .72rem 'JetBrains Mono';margin-top:4px}.charbtn{display:flex;gap:12px;align-items:center;width:100%;border:0;border-radius:8px;padding:14px 12px;background:0;color:var(--text);font-weight:800;text-align:left}.charbtn.on{background:#b9910f;color:#2e2500}.av,.coin{width:31px;height:31px;border-radius:999px;display:grid;place-items:center;background:var(--a);color:#0d1020;font:900 .7rem 'JetBrains Mono'}main{padding:18px 22px 56px;background:var(--bg)}.strip{display:grid;grid-template-columns:repeat(7,minmax(110px,1fr));gap:8px;padding:12px 14px;margin-bottom:30px;background:rgba(23,26,45,.85);border:1px solid var(--line);border-radius:8px;overflow:auto}.tok{display:grid;grid-template-columns:31px 1fr auto;gap:4px 8px;align-items:center}.tok span{font:900 .68rem 'JetBrains Mono'}.tok b{color:var(--gold);font:800 1.08rem Sora}.tok small{grid-column:3;font:900 .62rem 'JetBrains Mono'}.head{display:flex;justify-content:space-between;gap:18px;margin-bottom:28px}.head h1{margin:0;font:800 clamp(2.2rem,4.5vw,4rem)/1.04 Sora;letter-spacing:-.065em}.head p,.section p{margin:.35rem 0 0;color:#eff1ff;font:900 .78rem 'JetBrains Mono'}.btn,.gold{border:1px solid var(--line);border-radius:7px;padding:12px 18px;background:#26293c;color:#eef0ff;font:900 .8rem 'JetBrains Mono'}.gold{background:linear-gradient(135deg,#ffd84a,#d7ab16);color:#2f2600}.sections{display:grid;gap:64px}.sectiontop{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:16px}.title{display:flex;align-items:center;gap:22px}.big{width:64px;height:64px;border-radius:14px;display:grid;place-items:center;background:#26293c;color:var(--a);font:900 1rem 'JetBrains Mono'}.section h2{margin:0;font:800 2.3rem Sora;letter-spacing:-.05em}.slots{display:flex;gap:10px;align-items:center}.slot,.empty{width:46px;height:62px;border:1px dashed var(--line);border-radius:7px;background:#22263b;display:grid;place-items:center;overflow:hidden}.slot img{width:100%;height:100%;object-fit:cover}.strong{text-align:right;font:900 .72rem 'JetBrains Mono'}.strong b{display:block;color:var(--gold);font:800 1.2rem Sora}.rgrp{margin-top:22px}.rlabel{color:var(--r);font:900 .72rem 'JetBrains Mono';letter-spacing:.12em;margin-bottom:14px}.rlabel:before{content:'';display:inline-block;width:8px;height:8px;border-radius:999px;background:currentColor;margin-right:8px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,168px));gap:18px}.emptymsg{padding:13px 16px;border:1px dashed rgba(255,255,255,.1);border-radius:8px;color:#777d93;font:800 .75rem 'JetBrains Mono'}.card{position:relative;aspect-ratio:2.5/3.5;border-radius:10px;overflow:hidden;padding:9px;background:#15182a;box-shadow:0 0 0 1px color-mix(in srgb,var(--r),transparent 55%),0 0 26px color-mix(in srgb,var(--r),transparent 82%)}.card.bigcard{width:min(100%,350px);margin:auto;padding:16px;border-radius:18px}.art{position:absolute;inset:9px 9px auto;height:48%;border-radius:6px;overflow:hidden;background:linear-gradient(135deg,var(--a),#0e1122 55%,var(--r))}.bigcard .art{inset:74px 20px auto;height:45%}.art img{width:100%;height:100%;object-fit:cover}.ph{height:100%;display:grid;place-items:center}.ph b{width:56px;height:56px;border-radius:999px;background:rgba(255,255,255,.82);color:#111;display:grid;place-items:center;font-family:'JetBrains Mono'}.line{position:absolute;inset:5px;border:1px solid color-mix(in srgb,var(--r),transparent 35%);border-radius:8px}.ctop{position:relative;z-index:2;display:flex;justify-content:space-between;gap:6px;font:800 .73rem Sora}.bigcard .ctop{font-size:1.2rem}.badge{background:var(--r);color:#111;padding:4px 6px;border-radius:2px;font:900 .52rem 'JetBrains Mono';text-transform:uppercase}.eq{position:absolute;top:38px;right:14px;z-index:3;background:rgba(255,255,255,.72);color:#222;padding:5px 7px;border-radius:2px;font:900 .54rem 'JetBrains Mono';text-transform:uppercase}.stats{position:absolute;z-index:3;left:12px;right:12px;bottom:63px;display:grid;grid-template-columns:repeat(3,1fr);gap:5px}.bigcard .stats{left:20px;right:20px;bottom:112px}.stats div{text-align:center;background:rgba(38,41,60,.96);padding:5px 3px;border-radius:3px}.bigcard .stats div{padding:12px 3px}.stats small{display:block;color:#aab0cd;font:900 .46rem 'JetBrains Mono'}.stats b{font:800 .96rem Sora}.fx{position:absolute;left:12px;right:12px;bottom:27px;z-index:3;margin:0;padding:5px 6px;min-height:31px;background:rgba(12,14,28,.76);border-left:2px solid var(--r);font-size:.56rem;font-style:italic;line-height:1.25}.bigcard .fx{left:20px;right:20px;bottom:48px;min-height:54px;font-size:.82rem;padding:10px}.cbot{position:absolute;left:12px;right:12px;bottom:8px;z-index:3;display:flex;justify-content:space-between;font:900 .6rem 'JetBrains Mono'}.cbot button{border:1px solid var(--line);border-radius:3px;background:rgba(255,255,255,.06);color:#e8eaff;font-size:inherit}.mint{display:grid;grid-template-columns:minmax(0,1fr)360px;gap:34px;max-width:1180px;margin:auto}.stack{display:grid;gap:22px}.panel,.preview{border:1px solid var(--line);border-radius:9px;background:rgba(38,41,60,.78);padding:22px}.label{color:#c6c9e2;font:900 .72rem 'JetBrains Mono';letter-spacing:.08em;text-transform:uppercase}.upload{min-height:250px;margin-top:14px;display:grid;place-items:center;border:2px dashed rgba(255,255,255,.17);border-radius:10px;overflow:hidden;text-align:center;background:rgba(18,20,36,.55)}.upload input{display:none}.upload img{width:100%;height:250px;object-fit:cover}.tiles{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-top:14px}.tile{border:1px solid rgba(255,255,255,.09);border-radius:8px;padding:8px;color:#e3e6fa;background:#16192c;text-align:center}.tile.on{border-color:var(--gold);box-shadow:0 0 0 2px rgba(233,195,73,.18)}.tile i{display:grid;place-items:center;width:48px;height:48px;margin:0 auto 8px;border-radius:8px;background:linear-gradient(135deg,var(--a),#232641 82%);color:#0b0d19;font-style:normal;font:900 .75rem 'JetBrains Mono'}.tile b{display:block;color:var(--a);font:900 .66rem 'JetBrains Mono';text-transform:uppercase}.form{display:grid;grid-template-columns:1fr 220px;gap:16px}.form span{display:block;margin-bottom:8px;color:#c6c9e2;font-weight:800}.form input,.form select{width:100%;height:48px;border:1px solid var(--line);border-radius:7px;padding:0 12px;color:var(--text);background:#101326}.cost{min-height:72px;min-width:300px;display:grid;grid-template-columns:42px 1fr auto;gap:12px;align-items:center;border:2px solid #b9910f;border-radius:9px;padding:12px 16px;background:#14172a}.cost small{display:block;color:#aab0c7;font:900 .66rem 'JetBrains Mono';text-transform:uppercase}.cost strong{font-family:Sora;text-transform:uppercase}.preview{position:sticky;top:96px}.rareBtns{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:24px}.rareBtns button{height:48px;border:1px solid var(--line);border-radius:7px;background:#24273a;color:#e7e8ff;font:900 .8rem 'JetBrains Mono'}.rareBtns .on{background:#c49a0d;color:#302500}.grade{margin-top:20px;border:1px solid var(--line);border-radius:9px;padding:18px;background:rgba(15,18,36,.65)}.gline{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.08)}.battle,.market,.tokens{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}.box{border:1px solid var(--line);border-radius:12px;padding:20px;background:rgba(38,41,60,.72)}.box h3{font-family:Sora;color:var(--a);font-size:2rem;margin:16px 0 4px}.row{display:flex;gap:12px;flex-wrap:wrap}.log{margin-top:24px;display:grid;gap:10px}.log div{padding:12px;border-left:3px solid #35d6c5;background:rgba(15,18,36,.7);border-radius:8px}.log .loss{border-color:#eb5757}@media(max-width:1080px){.frame{border:0;border-radius:0}.layout{grid-template-columns:1fr}aside{display:none}.tabs,.search{display:none}.strip{grid-template-columns:repeat(7,132px)}.mint{grid-template-columns:1fr}.preview{position:static}}@media(max-width:740px){.top{height:64px;padding:0 14px}main{padding:16px 14px 44px}.head,.sectiontop{display:grid}.grid{grid-template-columns:repeat(2,1fr)}.tiles{grid-template-columns:repeat(2,1fr)}.form{grid-template-columns:1fr}.cost{min-width:0}.head h1{font-size:2.25rem}}
</style></head><body><main class="frame"><div id="app"></div></main><script>
const C=[['cydney','Cydney','CY','#f3c93f',['sterling','cooper','ryan'],['gabi','kenly','ashley']],['sterling','Sterling','ST','#c4c5db',['gabi','ashley','cooper'],['cydney','ryan','kenly']],['ryan','Ryan','RY','#a98cff',['sterling','cooper','gabi'],['cydney','ashley','kenly']],['gabi','Gabi','GA','#8ccdff',['cydney','ashley','kenly'],['sterling','ryan','cooper']],['cooper','Cooper','CO','#ff8f70',['gabi','kenly','ashley'],['cydney','sterling','ryan']],['kenly','Kenly','KE','#73e1c2',['sterling','ryan','cydney'],['gabi','cooper','ashley']],['ashley','Ashley','AS','#ff9ccf',['cydney','ryan','kenly'],['sterling','gabi','cooper']]].map(x=>({id:x[0],name:x[1],in:x[2],a:x[3],strong:x[4],weak:x[5]}));
const R={common:['Common','C',62,14,34,1,2,'#9da2b7'],uncommon:['Uncommon','U',25,26,48,2,3,'#35d6c5'],rare:['Rare','R',10,40,68,3,5,'#f3c93f'],legendary:['Legendary','L',3,62,96,5,8,'#b178ff']},tags=['Kitchen','Writing','Yard Project','Garage Sale','Battle','Fishing','County Fair','Sourdough','Softball','Cones','Chaos','Domestic Order'];
const E={cydney:'Silent Judgment',sterling:'Scope Creep',ryan:'Rules Exploit',gabi:'Baked Goods Morale',cooper:'Wrong Quest Momentum',kenly:'Precision Strike',ashley:'Softball Cannon'};let img=null,last=Date.now();const $=s=>document.querySelector(s),ch=id=>C.find(c=>c.id==id),rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a,pick=a=>a[Math.floor(Math.random()*a.length)],fmt=n=>Intl.NumberFormat(undefined,{notation:'compact',maximumFractionDigits:1}).format(n),num=n=>Number(n).toLocaleString(undefined,{maximumFractionDigits:0});
function rarity(){let t=Object.values(R).reduce((s,r)=>s+r[2],0),x=Math.random()*t;for(const k in R){x-=R[k][2];if(x<=0)return k}return'common'}
function title(id){return ch(id).name+', '+({cydney:'Kitchen Authority',sterling:'Scope Creep Prophet',ryan:'Belligerent Min-Maxer',gabi:'Sourdough Spirit',cooper:'Wrong Quest Champion',kenly:'Decisive Comment',ashley:'Softball Cannon'}[id])}
function make(o={}){let id=o.cid||state.draft.cid,rar=o.rar||rarity(),r=R[rar],c=ch(id),bonus=rar=='legendary'?25:rar=='rare'?15:rar=='uncommon'?10:5;return{id:id+'-'+Date.now()+'-'+Math.random().toString(16).slice(2),cid:id,title:o.title||title(id),tag:o.tag||'Battle',rar,p:rnd(r[3],r[4]),d:rnd(r[3],r[4]),s:rnd(r[3],r[4]),passive:rnd(r[5],r[6]),grade:pick(rar=='legendary'?['S','S+']:rar=='rare'?['A','S']:rar=='uncommon'?['B','A']:['C','B']),img:o.img||null,equipped:false,effect:E[id]+': +'+bonus+'% battle score against '+c.strong.map(x=>ch(x).name).join(', ')+'.'}}
function seed(){return [make({cid:'cydney',title:'Cydney, Kitchen Authority',tag:'Kitchen',rar:'rare'}),make({cid:'cydney',title:'Cydney, Novel Momentum',tag:'Writing',rar:'uncommon'}),make({cid:'ryan',title:'Ryan, Belligerent Min-Maxer',rar:'legendary'}),make({cid:'sterling',title:'Sterling, Scope Creep Prophet',rar:'rare'}),make({cid:'gabi',title:'Gabi, Sourdough Spirit',tag:'Sourdough',rar:'rare'}),make({cid:'cooper',title:'Cooper, Wrong Quest Champion',tag:'Chaos',rar:'uncommon'}),make({cid:'kenly',title:'Kenly, Decisive Comment',tag:'Cones',rar:'rare'}),make({cid:'ashley',title:'Ashley, Softball Cannon',tag:'Softball',rar:'rare'})].map((c,i)=>({...c,equipped:i<2}))}
let state=JSON.parse(localStorage.ctcg||'null')||{page:'collection',sel:'cydney',cards:seed(),tokens:Object.fromEntries(C.map((c,i)=>[c.id,1240-i*110])),prices:Object.fromEntries(C.map((c,i)=>[c.id,+(13.4-i*1.1+Math.random()).toFixed(2)])),cash:2500,draft:{cid:'cydney',title:'Cydney, Kitchen Authority',tag:'Kitchen',prev:'rare',roll:null},log:[]};
function save(){localStorage.ctcg=JSON.stringify(state)}function income(id){return state.cards.filter(c=>c.cid==id&&c.equipped).reduce((s,c)=>s+c.passive,0)}function score(c){return +c.p + +c.d + +c.s}function total(){return C.reduce((s,c)=>s+state.tokens[c.id]*state.prices[c.id],state.cash)}
function shell(content){return `<header class="top"><button class="brand" data-page="collection">Commune TCG</button><nav class="tabs">${['collection','mint','battle','market','tokens'].map(p=>`<button class="${state.page==p?'on':''}" data-page="${p}">${p=='mint'?'Mint Card':p[0].toUpperCase()+p.slice(1)}</button>`).join('')}</nav><input class="search" id="search" placeholder="Search collection..." value="${state.q||''}"></header><div class="layout"><aside><div class="rank">Vault Master<small>7/7 Characters Active</small></div>${C.map(c=>`<button class="charbtn ${state.sel==c.id?'on':''}" data-char="${c.id}"><span class="av" style="--a:${c.a}">${c.in}</span>${c.name}</button>`).join('')}<button class="sync">↺ Sync Vault</button></aside><main>${content}</main></div>`}
function strip(){return `<div class="strip">${C.map(c=>`<div class="tok"><span class="coin" style="--a:${c.a}">${c.in}</span><span>${c.name}</span><b>${fmt(state.tokens[c.id])}</b><small>+${income(c.id)}/m</small></div>`).join('')}</div>`}
function cardHtml(c,big=false){let cc=ch(c.cid),rr=R[c.rar]||R.rare;return `<article class="card ${big?'bigcard':''}" style="--a:${cc.a};--r:${rr[7]}"><div class="art">${c.img?`<img src="${c.img}">`:`<div class="ph"><b>${cc.in}</b></div>`}</div><div class="line"></div><div class="ctop"><strong>${(c.title||'Untitled').slice(0,big?32:19)}</strong><span class="badge">${rr[0]}</span></div>${c.equipped?'<span class="eq">Equipped</span>':''}<div class="stats"><div><small>POW</small><b>${c.p}</b></div><div><small>DEF</small><b>${c.d}</b></div><div><small>SPD</small><b>${c.s}</b></div></div><p class="fx">${c.effect}</p><div class="cbot"><span>+${c.passive}/min</span><button data-eq="${c.id}">${c.equipped?'Unequip':'Equip'}</button></div></article>`}
function collection(){let q=(state.q||'').toLowerCase();return shell(strip()+`<div class="head"><div><h1>Card Collection</h1><p>${state.cards.length} Cards Collected · $${num(total())} Vault Value</p></div><div class="row"><button class="btn">≡ Filter</button><button class="btn">≡ Sort by Rarity</button><button class="gold" data-page="mint">▦ Mint Card</button></div></div><div class="sections">${C.map(c=>section(c,q)).join('')}</div>`)}
function section(c,q){let cards=state.cards.filter(x=>x.cid==c.id&&(!q||(x.title+x.tag+x.effect+c.name).toLowerCase().includes(q))),best=cards.slice().sort((a,b)=>score(b)-score(a))[0],eq=state.cards.filter(x=>x.cid==c.id&&x.equipped);return `<section class="section"><div class="sectiontop"><div class="title"><div class="big" style="--a:${c.a}">${c.in}</div><div><h2>${c.name}</h2><p>${cards.length} Cards Collected · +${income(c.id)}/min Passive Income</p></div></div><div class="slots"><div class="strong">Strongest Card<b>${best?'POW '+best.p:'None'}</b></div>${[0,1,2].map(i=>eq[i]?`<div class="slot">${eq[i].img?`<img src="${eq[i].img}">`:ch(eq[i].cid).in}</div>`:'<div class="empty">+</div>').join('')}</div></div>${['legendary','rare','uncommon','common'].map(r=>grp(r,cards.filter(x=>x.rar==r),c)).join('')}</section>`}
function grp(r,cards,c){return `<div class="rgrp" style="--r:${R[r][7]}"><div class="rlabel">${R[r][0].toUpperCase()}</div><div class="grid">${cards.length?cards.map(x=>cardHtml(x)).join(''):`<div class="emptymsg">No ${R[r][0]} ${c.name} Cards Yet</div>`}</div></div>`}
function mint(){let d=state.draft,cc=ch(d.cid),prev=d.roll||{cid:d.cid,title:d.title||title(d.cid),rar:d.prev,p:'??',d:'??',s:'??',passive:'?',effect:'Effect unrolled. Roll stats to grade this identity.',img,equipped:false};return shell(`<div class="mint"><section class="stack"><div class="head"><div><h1>Forge New Identity</h1><p>Channel your tokens into a unique character essence.</p></div></div><div class="panel"><div class="label">Upload Artwork</div><label class="upload">${img?`<img src="${img}">`:'<div><div style="font-size:2rem">☁</div><b>Drop image here or click to browse</b><br><small>Recommended: 1024×1024 AI generation or high-res portrait</small></div>'}<input id="up" type="file" accept="image/png,image/jpeg,image/webp"></label></div><div class="panel"><div class="label">Select Character</div><div class="tiles">${C.map(c=>`<button class="tile ${d.cid==c.id?'on':''}" data-draft="${c.id}" style="--a:${c.a}"><i>${c.in}</i><b>${c.name}</b></button>`).join('')}</div></div><div class="panel form"><label><span>Card Title</span><input id="ct" value="${d.title||''}"></label><label><span>Flavor Tag</span><select id="tag">${tags.map(t=>`<option ${d.tag==t?'selected':''}>${t}</option>`).join('')}</select></label></div><div class="row"><div class="cost"><span>○</span><div><small>Total Mint Cost</small><strong>500 ${cc.name}<br>Tokens</strong></div><div><small>Balance</small><strong>${fmt(state.tokens[cc.id])}</strong></div></div><button class="btn" id="roll">↻ Roll Stats</button><button class="gold" id="mintbtn">✦ Mint Card</button></div></section><aside class="preview"><div class="label">Card Preview</div>${cardHtml(prev,true)}<div class="rareBtns">${Object.keys(R).map(r=>`<button class="${prev.rar==r?'on':''}" data-prev="${r}">${R[r][1]}</button>`).join('')}</div><div class="grade"><div class="label">Card Grade</div>${g('Rarity',R[prev.rar][0])}${g('Final Grade',prev.grade||'Unrolled')}${g('Passive','+'+prev.passive+'/min')}${g('Strong Against',cc.strong.map(x=>ch(x).name).join(', '))}${g('Weak Against',cc.weak.map(x=>ch(x).name).join(', '))}</div></aside></div>`)}function g(a,b){return `<div class="gline"><span>${a}</span><b>${b}</b></div>`}
function battle(){return shell(`<div class="head"><div><h1>Battle Arena</h1><p>Fight random opponents. Active play pays better than passive slots.</p></div><button class="gold" id="fight">⚔ Start Battle</button></div><div class="battle">${state.cards.map(c=>cardHtml(c)).join('')}</div><div class="log">${state.log.map(x=>`<div class="${x.win?'':'loss'}"><b>${x.win?'Victory':'Defeat'}</b><br>${x.txt}</div>`).join('')||'<div>No battles yet.</div>'}</div>`)}
function market(){return shell(`<div class="head"><div><h1>Token Market</h1><p>Fake prices drift. Buy low, sell high, learn nothing.</p></div><button class="btn">Cash: $${num(state.cash)}</button></div><div class="market">${C.map(c=>`<article class="box" style="--a:${c.a}"><div class="row"><span class="coin" style="--a:${c.a}">${c.in}</span><b>${c.name}</b></div><h3>$${state.prices[c.id].toFixed(2)}</h3><p>${fmt(state.tokens[c.id])} tokens</p><div class="row"><button class="btn" data-buy="${c.id}">Buy 10</button><button class="btn" data-sell="${c.id}">Sell 10</button></div></article>`).join('')}</div>`)}
function tokens(){return shell(`<div class="head"><div><h1>Token Vault</h1><p>Balances, passive income, and current market price.</p></div></div><div class="tokens">${C.map(c=>`<article class="box" style="--a:${c.a}"><div class="row"><div class="big" style="--a:${c.a}">${c.in}</div><div><h2>${c.name}</h2><p>${num(state.tokens[c.id])} Tokens</p><p>+${income(c.id)}/min · Market $${state.prices[c.id].toFixed(2)}</p></div></div></article>`).join('')}</div>`)}
function render(){document.getElementById('app').innerHTML=({collection,mint,battle,market,tokens}[state.page]||collection)();bind()}function bind(){document.querySelectorAll('[data-page]').forEach(b=>b.onclick=()=>{state.page=b.dataset.page;save();render()});document.querySelectorAll('[data-char]').forEach(b=>b.onclick=()=>{state.sel=b.dataset.char;state.draft.cid=b.dataset.char;save();render()});document.querySelectorAll('[data-draft]').forEach(b=>b.onclick=()=>{state.draft.cid=b.dataset.draft;state.draft.title=title(b.dataset.draft);state.draft.roll=null;save();render()});document.querySelectorAll('[data-eq]').forEach(b=>b.onclick=e=>{e.stopPropagation();let c=state.cards.find(x=>x.id==b.dataset.eq);if(c.equipped)c.equipped=false;else{if(state.cards.filter(x=>x.cid==c.cid&&x.equipped).length>=3)return alert(ch(c.cid).name+' already has 3 passive cards equipped.');c.equipped=true}save();render()});let s=document.getElementById('search');if(s)s.oninput=()=>{state.q=s.value;save();render()};let up=document.getElementById('up');if(up)up.onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader;r.onload=()=>{img=r.result;state.draft.roll=null;render()};r.readAsDataURL(f)};let ct=document.getElementById('ct');if(ct)ct.oninput=()=>{state.draft.title=ct.value;state.draft.roll=null;save()};let tg=document.getElementById('tag');if(tg)tg.onchange=()=>{state.draft.tag=tg.value;state.draft.roll=null;save();render()};document.querySelectorAll('[data-prev]').forEach(b=>b.onclick=()=>{state.draft.prev=b.dataset.prev;save();render()});let roll=document.getElementById('roll');if(roll)roll.onclick=()=>{state.draft.roll=make({cid:state.draft.cid,title:state.draft.title,tag:state.draft.tag,img});save();render()};let mb=document.getElementById('mintbtn');if(mb)mb.onclick=()=>{let d=state.draft;if(state.tokens[d.cid]<500)return alert('Not enough '+ch(d.cid).name+' Tokens.');let c=d.roll||make({cid:d.cid,title:d.title,tag:d.tag,img});state.tokens[d.cid]-=500;state.cards.unshift(c);d.roll=null;img=null;state.page='collection';state.sel=d.cid;save();render()};let f=document.getElementById('fight');if(f)f.onclick=fight;document.querySelectorAll('[data-buy]').forEach(b=>b.onclick=()=>{let id=b.dataset.buy,cost=state.prices[id]*10;if(state.cash<cost)return alert('Not enough Commune Cash.');state.cash-=cost;state.tokens[id]+=10;save();render()});document.querySelectorAll('[data-sell]').forEach(b=>b.onclick=()=>{let id=b.dataset.sell;if(state.tokens[id]<10)return alert('Not enough tokens.');state.cash+=state.prices[id]*10;state.tokens[id]-=10;save();render()})}
function mod(a,d){let c=ch(a);return c.strong.includes(d)?1.25:(c.weak.includes(d)?0.75:1)}function fight(){let me=pick(state.cards),enemy=make({cid:pick(C.filter(c=>c.id!=me.cid)).id,rar:rarity()}),ms=Math.round((score(me)+rnd(1,30))*mod(me.cid,enemy.cid)),es=Math.round((score(enemy)+rnd(1,30))*mod(enemy.cid,me.cid)),win=ms>=es,reward=win?Math.round(me.passive*20+me.p/2+rnd(10,60)):Math.round(me.passive*3);state.tokens[me.cid]+=reward;state.log.unshift({win,txt:`${me.title} ${win?'defeated':'lost to'} ${enemy.title}. Score ${ms} to ${es}. ${win?'+':'Consolation +'}${reward} ${ch(me.cid).name} Tokens.`});save();render()}
function tick(){let now=Date.now(),min=(now-last)/60000;if(now-last<5000)return;C.forEach(c=>state.tokens[c.id]=+(state.tokens[c.id]+income(c.id)*min).toFixed(2));last=now;save();render()}function drift(){C.forEach(c=>{let v=c.id=='cooper'?.14:c.id=='ryan'?.11:c.id=='cydney'?.06:.08;state.prices[c.id]=Math.max(.5,+(state.prices[c.id]*(1+(Math.random()-.46)*v)).toFixed(2))});save();render()}setInterval(tick,5000);setInterval(drift,12000);render();
</script></body></html>
