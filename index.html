<style>

cover}.ph{height:100%;display:grid;place-items:center;text-align:center}.ph b{width:56px;height:56px;border-radius:999px;background:rgba(255,255,255,.82);color:#15182a;display:grid;place-items:center;font-family:JetBrains Mono}.frameLine{position:absolute;inset:5px;border:1px solid color-mix(in srgb,var(--r),transparent 35%);border-radius:8px}.large .frameLine{inset:8px;border-radius:16px}.ctop{position:relative;z-index:2;display:flex;justify-content:space-between;gap:6px;font-family:Sora;font-size:.73rem;line-height:1.05}.large .ctop{font-size:1.2rem}.badge{padding:4px 6px;border-radius:2px;background:var(--r);color:#11131e;font-family:JetBrains Mono;font-size:.52rem;font-weight:900;text-transform:uppercase}.eq{position:absolute;z-index:3;top:38px;right:14px;padding:5px 7px;background:rgba(255,255,255,.72);color:#222;border-radius:2px;font-family:JetBrains Mono;font-size:.54rem;font-weight:900;text-transform:uppercase}.stats{position:absolute;z-index:3;left:12px;right:12px;bottom:63px;display:grid;grid-template-columns:repeat(3,1fr);gap:5px}.large .stats{left:20px;right:20px;bottom:112px}.stats div{padding:5px 3px;text-align:center;background:rgba(38,41,60,.96);border-radius:3px}.large .stats div{padding:12px 3px}.stats small{display:block;color:#aab0cd;font-family:JetBrains Mono;font-size:.46rem;font-weight:900}.stats b{font-family:Sora;font-size:.96rem}.large .stats b{font-size:1.4rem}.fx{position:absolute;z-index:3;left:12px;right:12px;bottom:27px;min-height:31px;margin:0;padding:5px 6px;background:rgba(12,14,28,.76);border-left:2px solid var(--r);font-size:.56rem;font-style:italic;line-height:1.25}.large .fx{left:20px;right:20px;bottom:48px;min-height:54px;font-size:.82rem;padding:10px}.cbot{position:absolute;z-index:3;left:12px;right:12px;bottom:8px;display:flex;justify-content:space-between;align-items:center;font-family:JetBrains Mono;font-size:.6rem;font-weight:900}.cbot button{border:1px solid rgba(255,255,255,.14);border-radius:3px;color:#e8eaff;background:rgba(255,255,255,.06);font-size:inherit;padding:3px 5px}.mint{display:grid;grid-template-columns:minmax(0,1fr)360px;gap:34px;max-width:1180px;margin:auto}.stack{display:grid;gap:22px}.panel,.preview{border:1px solid var(--line);border-radius:9px;background:rgba(38,41,60,.78);padding:22px}.label{color:#c6c9e2;font-family:JetBrains Mono;font-size:.72rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.upload{min-height:250px;margin-top:14px;display:grid;place-items:center;border:2px dashed rgba(255,255,255,.17);border-radius:10px;overflow:hidden;background:rgba(18,20,36,.55);text-align:center;color:#c9ccdd}.upload input{display:none}.upload img{width:100%;height:250px;object-fit:cover}.tiles{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-top:14px}.tile{min-width:0;border:1px solid rgba(255,255,255,.09);border-radius:8px;padding:8px;color:#e3e6fa;background:#16192c;text-align:center}.tile.active{border-color:var(--gold);box-shadow:0 0 0 2px rgba(233,195,73,.18)}.tile i{display:grid;place-items:center;width:48px;height:48px;margin:0 auto 8px;border-radius:8px;background:linear-gradient(135deg,var(--a),#232641 82%);color:#0b0d19;font-style:normal;font-family:JetBrains Mono;font-weight:900}.tile b{display:block;color:var(--a);font-family:JetBrains Mono;font-size:.66rem;text-transform:uppercase}.form{display:grid;grid-template-columns:1fr 220px;gap:16px}.form label span{display:block;margin-bottom:8px;color:#c6c9e2;font-size:.8rem;font-weight:800}.form input,.form select{width:100%;height:48px;border:1px solid var(--line);border-radius:7px;padding:0 12px;color:var(--text);background:#101326;outline:0}.cost{min-height:72px;min-width:300px;display:grid;grid-template-columns:42px 1fr auto;gap:12px;align-items:center;border:2px solid var(--gold2);border-radius:9px;padding:12px 16px;background:#14172a}.cost small{display:block;color:#aab0c7;font-family:JetBrains Mono;font-size:.66rem;font-weight:900;text-transform:uppercase}.cost strong{font-family:Sora;text-transform:uppercase;line-height:1.05}.preview{position:sticky;top:96px}.phead{display:flex;justify-content:space-between;margin-bottom:16px}.phead span{font-family:JetBrains Mono;font-size:.72rem;font-weight:900;text-transform:uppercase}.phead b{font-size:.8rem}.rareBtns{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:24px}.rareBtns button{height:48px;border:1px solid var(--line);border-radius:7px;background:#24273a;color:#e7e8ff;font-family:JetBrains Mono;font-weight:900}.rareBtns button.active{background:#c49a0d;color:#302500}.grade{margin-top:20px;border:1px solid var(--line);border-radius:9px;padding:18px;background:rgba(15,18,36,.65)}.gline{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.08)}.gline span{color:#aab0c7}.battle,.market,.tokens{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}.marketCard,.tokenCard{border:1px solid var(--line);border-radius:12px;padding:20px;background:rgba(38,41,60,.72)}.marketCard h3{font-family:Sora;color:var(--a);font-size:2rem;margin:16px 0 4px}.marketCard p,.tokenCard p{color:#b6bad1}.mini{display:flex;align-items:center;gap:12px}.marketCard button{border:1px solid var(--line);border-radius:6px;padding:9px 12px;color:#f3f4ff;background:#101326}.log{margin-top:24px;display:grid;gap:10px}.log div{padding:12px;border-left:3px solid var(--teal);background:rgba(15,18,36,.7);border-radius:8px}.log .loss{border-color:var(--red)}@media(max-width:1080px){.frame{border:0;border-radius:0}.layout{grid-template-columns:1fr}.side{border-right:0;border-bottom:1px solid var(--line)}.charlist,.rank,.sync{display:none}.tabs{display:none}.search{display:none}.strip{grid-template-columns:repeat(7,132px)}.mint{grid-template-columns:1fr}.preview{position:static}}@media(max-width:740px){.top{height:64px;padding:0 14px}.content{padding:16px 14px 44px}.head,.sectiontop{display:grid}.grid{grid-template-columns:repeat(2,1fr)}.tiles{grid-template-columns:repeat(2,1fr)}.form{grid-template-columns:1fr}.cost{min-width:0}.head h1{font-size:2.25rem}}

<body><main class="frame"><div id="app"></div></main>
<script>
const C=[['cydney','Cydney','CY','#f3c93f','Domestic Order / Silent Judgment',['sterling','cooper','ryan'],['gabi','kenly','ashley']],['sterling','Sterling','ST','#c4c5db','Projects / Strategy / Scope Creep',['gabi','ashley','cooper'],['cydney','ryan','kenly']],['ryan','Ryan','RY','#a98cff','Min-Maxer / Rule Exploits',['sterling','cooper','gabi'],['cydney','ashley','kenly']],['gabi','Gabi','GA','#8ccdff','Baking / Morale / Cozy Power',['cydney','ashley','kenly'],['sterling','ryan','cooper']],['cooper','Cooper','CO','#ff8f70','Wrong Quest / Chaos Momentum',['gabi','kenly','ashley'],['cydney','sterling','ryan']],['kenly','Kenly','KE','#73e1c2','Precision / Decisive Action',['sterling','ryan','cydney'],['gabi','cooper','ashley']],['ashley','Ashley','AS','#ff9ccf','Athletics / Power / Momentum',['cydney','ryan','kenly'],['sterling','gabi','cooper']]].map(x=>({id:x[0],name:x[1],in:x[2],a:x[3],type:x[4],strong:x[5],weak:x[6]}));
const R={common:['Common','C',62,14,34,1,2,'#9da2b7'],uncommon:['Uncommon','U',25,26,48,2,3,'#35d6c5'],rare:['Rare','R',10,40,68,3,5,'#f3c93f'],legendary:['Legendary','L',3,62,96,5,8,'#b178ff']};
const E={cydney:['Silent Judgment','Domestic Order','Raised Eyebrow','Kitchen Authority'],sterling:['Scope Creep','Whiteboard Strategy','Over-Explained Plan','Dominion Multiplier'],ryan:['Rules Exploit','Min-Max Engine','Belligerent Optimization','Loophole Detected'],gabi:['Baked Goods Morale','Sourdough Spirit','Cottagecore Recovery','Hospitality Buff'],cooper:['Wrong Quest Momentum','Accidental Victory','Dubious Toolbox','Plot Armor'],kenly:['Decisive Comment','Precision Strike','Tiny Queen Premium','Board State Corrected'],ashley:['Softball Cannon','Leg Day Momentum','Meal Prep Engine','Athletic Pressure']};
const tags=['Kitchen','Writing','Yard Project','Garage Sale','Battle','Fishing','County Fair','Sourdough','Softball','Cones','Chaos','Domestic Order'];let img=null,last=Date.now();
const $=s=>document.querySelector(s),ch=id=>C.find(c=>c.id==id),pick=a=>a[Math.floor(Math.random()*a.length)],rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a,fmt=n=>Intl.NumberFormat(undefined,{notation:'compact',maximumFractionDigits:1}).format(n),money=n=>Number(n).toLocaleString(undefined,{maximumFractionDigits:0});
function rarity(){let t=Object.values(R).reduce((s,r)=>s+r[2],0),x=Math.random()*t;for(const k in R){x-=R[k][2];if(x<=0)return k}return'common'}
function title(id){return ch(id).name+', '+({cydney:'Kitchen Authority',sterling:'Scope Creep Prophet',ryan:'Belligerent Min-Maxer',gabi:'Sourdough Spirit',cooper:'Wrong Quest Champion',kenly:'Decisive Comment',ashley:'Softball Cannon'}[id])}
function card({id=state.draft.cid,t=title(id),tag='Battle',rar=rarity(),image=null}={}){let r=R[rar],p=rnd(r[3],r[4]),d=rnd(r[3],r[4]),s=rnd(r[3],r[4]),ef=pick(E[id]),bonus=rar=='legendary'?25:rar=='rare'?15:rar=='uncommon'?10:5;return{id:id+'-'+Date.now()+'-'+Math.random().toString(16).slice(2),cid:id,title:t,tag,rar,p,d,s,passive:rnd(r[5],r[6]),grade:pick(rar=='legendary'?['S','S+']:rar=='rare'?['A','S']:rar=='uncommon'?['B','A']:['C','B']),img:image,equipped:false,effect:ef+': +'+bonus+'% battle score against '+ch(id).strong.map(x=>ch(x).name).join(', ')+'.'}}
function seed(){return [card({id:'cydney',t:'Cydney, Kitchen Authority',tag:'Kitchen',rar:'rare'}),card({id:'cydney',t:'Cydney, Novel Momentum',tag:'Writing',rar:'uncommon'}),card({id:'ryan',t:'Ryan, Belligerent Min-Maxer',rar:'legendary'}),card({id:'sterling',t:'Sterling, Scope Creep Prophet',rar:'rare'}),card({id:'gabi',t:'Gabi, Sourdough Spirit',tag:'Sourdough',rar:'rare'}),card({id:'cooper',t:'Cooper, Wrong Quest Champion',tag:'Chaos',rar:'uncommon'}),card({id:'kenly',t:'Kenly, Decisive Comment',tag:'Cones',rar:'rare'}),card({id:'ashley',t:'Ashley, Softball Cannon',tag:'Softball',rar:'rare'})].map((c,i)=>({...c,equipped:i<2}))}
let state=JSON.parse(localStorage.ctcg||'null')||{page:'collection',sel:'cydney',cards:seed(),tokens:Object.fromEntries(C.map((c,i)=>[c.id,1240-i*110])),prices:Object.fromEntries(C.map((c,i)=>[c.id,+(13.4-i*1.1+Math.random()).toFixed(2)])),cash:2500,draft:{cid:'cydney',t:'Cydney, Kitchen Authority',tag:'Kitchen',prev:'rare',roll:null},battleLog:[]};
function save(){localStorage.ctcg=JSON.stringify(state)}function income(id){return state.cards.filter(c=>c.cid==id&&c.equipped).reduce((s,c)=>s+c.passive,0)}function score(c){return c.p+c.d+c.s}function total(){return C.reduce((s,c)=>s+state.tokens[c.id]*state.prices[c.id],state.cash)}
function nav(){return ['collection','mint','battle','market','tokens'].map(p=>`<button class="${state.page==p?'active':''}" data-page="${p}">${p=='mint'?'Mint Card':p[0].toUpperCase()+p.slice(1)}</button>`).join('')}
function shell(content){return `<header class="top"><button class="brand" data-page="collection">Commune TCG</button><nav class="tabs">${nav()}</nav><label class="search"><span>⌕</span><input id="search" placeholder="Search collection..." value="${state.q||''}"></label><button class="icon">▣</button><button class="icon">⚙</button></header><div class="layout"><aside class="side"><div class="rank">Vault Master<small>7/7 Characters Active</small></div><div class="charlist">${C.map(c=>`<button class="charbtn ${state.sel==c.id?'active':''}" data-char="${c.id}"><span class="avatar" style="--a:${c.a}">${c.in}</span>${c.name}</button>`).join('')}</div><button class="sync">↺ Sync Vault</button></aside><section class="content">${content}</section></div>`}
function strip(){return `<div class="strip">${C.map(c=>`<div class="tok"><span class="coin" style="--a:${c.a}">${c.in}</span><span>${c.name}</span><b>${fmt(state.tokens[c.id])}</b><small>+${income(c.id)}/m</small></div>`).join('')}</div>`}
function cardHtml(c,big=false){let cc=ch(c.cid),rr=R[c.rar]||R.rare;return `<article class="card ${big?'large':''}" style="--a:${cc.a};--r:${rr[7]}"><div class="art">${c.img?`<img src="${c.img}">`:`<div class="ph"><b>${cc.in}</b></div>`}</div><div class="frameLine"></div><div class="ctop"><strong>${(c.title||'Untitled').slice(0,big?32:19)}</strong><span class="badge">${rr[0]}</span></div>${c.equipped?'<span class="eq">Equipped</span>':''}<div class="stats"><div><small>POW</small><b>${c.p}</b></div><div><small>DEF</small><b>${c.d}</b></div><div><small>SPD</small><b>${c.s}</b></div></div><p class="fx">${c.effect}</p><div class="cbot"><span>+${c.passive}/min</span><button data-eq="${c.id}">${c.equipped?'Unequip':'Equip'}</button></div></article>`}
function collection(){let q=(state.q||'').toLowerCase();return shell(strip()+`<div class="head"><div><h1>Card Collection</h1><p>${state.cards.length} Cards Collected · $${money(total())} Vault Value</p></div><div class="row"><button class="btn">≡ Filter</button><button class="btn">≡ Sort by Rarity</button><button class="gold" data-page="mint">▦ Mint Card</button></div></div><div class="sections">${C.map(c=>section(c,q)).join('')}</div>`)}
function section(c,q){let cards=state.cards.filter(x=>x.cid==c.id&&(!q||(x.title+x.tag+x.effect+c.name).toLowerCase().includes(q))),best=cards.slice().sort((a,b)=>score(b)-score(a))[0],eq=state.cards.filter(x=>x.cid==c.id&&x.equipped);return `<section class="section" id="${c.id}"><div class="sectiontop"><div class="titlewrap"><div class="bigav" style="--a:${c.a}">${c.in}</div><div><h2>${c.name}</h2><p>${cards.length} Cards Collected · +${income(c.id)}/min Passive Income</p></div></div><div class="slots"><div class="strong">Strongest Card<b>${best?'POW '+best.p:'None'}</b></div>${[0,1,2].map(i=>eq[i]?`<div class="slot">${eq[i].img?`<img src="${eq[i].img}">`:ch(eq[i].cid).in}</div>`:'<div class="empty">+</div>').join('')}</div></div>${['legendary','rare','uncommon','common'].map(r=>grp(r,cards.filter(x=>x.rar==r),c)).join('')}</section>`}
function grp(r,cards,c){return `<div class="rgrp" style="--r:${R[r][7]}"><div class="rlabel">${R[r][0].toUpperCase()}</div><div class="grid">${cards.length?cards.map(x=>cardHtml(x)).join(''):`<div class="emptymsg">No ${R[r][0]} ${c.name} Cards Yet</div>`}</div></div>`}
function mint(){let d=state.draft,cc=ch(d.cid),prev=d.roll||{cid:d.cid,title:d.t||title(d.cid),rar:d.prev||'rare',p:'??',d:'??',s:'??',passive:'?',effect:'Effect unrolled. Roll stats to grade this identity.',img,equipped:false};return shell(`<div class="mint"><section class="stack"><div class="head"><div><h1>Forge New Identity</h1><p>Channel your tokens into a unique character essence.</p></div></div><div class="panel"><div class="label">Upload Artwork</div><label class="upload">${img?`<img src="${img}">`:'<div><div style="font-size:2rem">☁</div><b>Drop image here or click to browse</b><br><small>Recommended: 1024×1024 AI generation or high-res portrait</small></div>'}<input id="up" type="file" accept="image/png,image/jpeg,image/webp"></label></div><div class="panel"><div class="label">Select Character</div><div class="tiles">${C.map(c=>`<button class="tile ${d.cid==c.id?'active':''}" data-draft="${c.id}" style="--a:${c.a}"><i>${c.in}</i><b>${c.name}</b></button>`).join('')}</div></div><div class="panel form"><label><span>Card Title</span><input id="ct" value="${d.t||''}"></label><label><span>Flavor Tag</span><select id="tag">${tags.map(t=>`<option ${d.tag==t?'selected':''}>${t}</option>`).join('')}</select></label></div><div class="row"><div class="cost"><span>○</span><div><small>Total Mint Cost</small><strong>500 ${cc.name}<br>Tokens</strong></div><div><small>Balance</small><strong>${fmt(state.tokens[cc.id])}</strong></div></div><button class="btn" id="roll">↻ Roll Stats</button><button class="gold" id="mintbtn">✦ Mint Card</button></div></section><aside class="preview"><div class="phead"><span>Card Preview</span><b>Live Preview ●</b></div>${cardHtml(prev,true)}<div class="rareBtns">${Object.keys(R).map(r=>`<button class="${prev.rar==r?'active':''}" data-prev="${r}">${R[r][1]}</button>`).join('')}</div><div class="grade"><div class="label">Card Grade</div>${g('Rarity',R[prev.rar][0])}${g('Final Grade',prev.grade||'Unrolled')}${g('Passive','+'+prev.passive+'/min')}${g('Strong Against',cc.strong.map(x=>ch(x).name).join(', '))}${g('Weak Against',cc.weak.map(x=>ch(x).name).join(', '))}</div></aside></div>`)}
function g(a,b){return `<div class="gline"><span>${a}</span><b>${b}</b></div>`}
function battle(){return shell(`<div class="head"><div><h1>Battle Arena</h1><p>Pick a card. Fight a random opponent. Active play pays better than passive slots.</p></div><button class="gold" id="fight">⚔ Start Battle</button></div><div class="battle">${state.cards.map(c=>cardHtml(c)).join('')}</div><div class="log">${state.battleLog.map(x=>`<div class="${x.win?'':'loss'}"><b>${x.win?'Victory':'Defeat'}</b><br>${x.txt}</div>`).join('')||'<div>No battles yet.</div>'}</div>`)}
function market(){return shell(`<div class="head"><div><h1>Token Market</h1><p>Fake prices drift. Buy low, sell high, learn nothing.</p></div><div class="btn">Commune Cash: $${money(state.cash)}</div></div><div class="market">${C.map(c=>`<article class="marketCard" style="--a:${c.a}"><div class="mini"><span class="coin" style="--a:${c.a}">${c.in}</span><b>${c.name}</b></div><h3>$${state.prices[c.id].toFixed(2)}</h3><p>${fmt(state.tokens[c.id])} tokens</p><div class="row"><button data-buy="${c.id}">Buy 10</button><button data-sell="${c.id}">Sell 10</button></div></article>`).join('')}</div>`)}
function tokens(){return shell(`<div class="head"><div><h1>Token Vault</h1><p>Character balances, passive income, and current market price.</p></div></div><div class="tokens">${C.map(c=>`<article class="tokenCard"><div class="mini"><div class="bigav" style="--a:${c.a}">${c.in}</div><div><h3>${c.name}</h3><p>${c.type}</p><b>${money(state.tokens[c.id])} Tokens</b><p>+${income(c.id)}/min · Market $${state.prices[c.id].toFixed(2)}</p></div></div></article>`).join('')}</div>`)}
function render(){let page={collection,mint,battle,market,tokens}[state.page]||collection;$('#app').innerHTML=page();bind()}function bind(){document.querySelectorAll('[data-page]').forEach(b=>b.onclick=()=>{state.page=b.dataset.page;save();render()});document.querySelectorAll('[data-char]').forEach(b=>b.onclick=()=>{state.sel=b.dataset.char;state.draft.cid=b.dataset.char;save();render()});document.querySelectorAll('[data-draft]').forEach(b=>b.onclick=()=>{state.draft.cid=b.dataset.draft;state.draft.t=title(b.dataset.draft);state.draft.roll=null;save();render()});document.querySelectorAll('[data-eq]').forEach(b=>b.onclick=e=>{e.stopPropagation();let c=state.cards.find(x=>x.id==b.dataset.eq);if(c.equipped)c.equipped=false;else{if(state.cards.filter(x=>x.cid==c.cid&&x.equipped).length>=3)return alert(ch(c.cid).name+' already has 3 passive cards equipped.');c.equipped=true}save();render()});let s=$('#search');if(s)s.oninput=()=>{state.q=s.value;save();render()};let up=$('#up');if(up)up.onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader;r.onload=()=>{img=r.result;state.draft.roll=null;render()};r.readAsDataURL(f)};let ct=$('#ct');if(ct)ct.oninput=()=>{state.draft.t=ct.value;state.draft.roll=null;save()};let tg=$('#tag');if(tg)tg.onchange=()=>{state.draft.tag=tg.value;state.draft.roll=null;save();render()};document.querySelectorAll('[data-prev]').forEach(b=>b.onclick=()=>{state.draft.prev=b.dataset.prev;save();render()});let roll=$('#roll');if(roll)roll.onclick=()=>{state.draft.roll=card({id:state.draft.cid,t:state.draft.t,tag:state.draft.tag,image:img});save();render()};let mb=$('#mintbtn');if(mb)mb.onclick=()=>{let cost=500,d=state.draft;if(state.tokens[d.cid]<cost)return alert('Not enough '+ch(d.cid).name+' Tokens.');let c=d.roll||card({id:d.cid,t:d.t,tag:d.tag,image:img});c.id=c.cid+'-'+Date.now();state.tokens[d.cid]-=cost;state.cards.unshift(c);d.roll=null;img=null;state.page='collection';state.sel=d.cid;save();render()};let f=$('#fight');if(f)f.onclick=()=>fight();document.querySelectorAll('[data-buy]').forEach(b=>b.onclick=()=>{let id=b.dataset.buy,cost=state.prices[id]*10;if(state.cash<cost)return alert('Not enough Commune Cash.');state.cash-=cost;state.tokens[id]+=10;save();render()});document.querySelectorAll('[data-sell]').forEach(b=>b.onclick=()=>{let id=b.dataset.sell;if(state.tokens[id]<10)return alert('Not enough tokens.');state.cash+=state.prices[id]*10;state.tokens[id]-=10;save();render()})}
function mod(a,d){let c=ch(a);return c.strong.includes(d)?1.25:c.weak.includes(d)?.75:1}function fight(){let me=pick(state.cards),enemy=card({id:pick(C.filter(c=>c.id!=me.cid)).id,rar:rarity()}),ms=Math.round((score(me)+rnd(1,30))*mod(me.cid,enemy.cid)),es=Math.round((score(enemy)+rnd(1,30))*mod(enemy.cid,me.cid)),win=ms>=es,reward=win?Math.round(me.passive*20+me.p/2+rnd(10,60)):Math.round(me.passive*3);state.tokens[me.cid]+=reward;state.battleLog.unshift({win,txt:`${me.title} ${win?'defeated':'lost to'} ${enemy.title}. Score ${ms} to ${es}. ${win?'+':'Consolation +'}${reward} ${ch(me.cid).name} Tokens.`});save();render()}
function tick(){let now=Date.now(),min=(now-last)/60000;if(now-last<5000)return;C.forEach(c=>state.tokens[c.id]=+(state.tokens[c.id]+income(c.id)*min).toFixed(2));last=now;save();render()}function drift(){C.forEach(c=>{let v=c.id=='cooper'?.14:c.id=='ryan'?.11:c.id=='cydney'?.06:.08;state.prices[c.id]=Math.max(.5,+(state.prices[c.id]*(1+(Math.random()-.46)*v)).toFixed(2))});save();render()}
setInterval(tick,5000);setInterval(drift,12000);render();
</script>
</body>
</html>
