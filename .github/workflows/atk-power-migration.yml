name: One-time ATK and Power terminology migration

on:
  push:
    branches:
      - Gacha
    paths:
      - .github/workflows/atk-power-migration.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: atk-power-terminology-migration
  cancel-in-progress: true

jobs:
  migrate-build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Gacha
        uses: actions/checkout@v4
        with:
          ref: Gacha
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Migrate, validate, build, and publish
        shell: bash
        run: |
          set +e
          LOG_FILE="$(mktemp)"
          STATUS=0

          run_logged() {
            echo "> $*" | tee -a "$LOG_FILE"
            "$@" >> "$LOG_FILE" 2>&1
            local EXIT_CODE=$?
            if [ "$EXIT_CODE" -ne 0 ]; then
              STATUS="$EXIT_CODE"
              echo "Command failed with exit code $EXIT_CODE: $*" | tee -a "$LOG_FILE"
            fi
            return "$EXIT_CODE"
          }

          run_logged python3 scripts/atk_power_migration.py

          if [ "$STATUS" -eq 0 ]; then
            run_logged npm install --no-package-lock --no-audit --no-fund
          fi

          if [ "$STATUS" -eq 0 ]; then
            run_logged npm run build
          fi

          if [ "$STATUS" -eq 0 ]; then
            run_logged git diff --check
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$STATUS" -ne 0 ]; then
            git reset --hard HEAD
            mkdir -p docs
            {
              echo "# ATK / Power Migration Workflow Failure"
              echo
              echo '```text'
              cat "$LOG_FILE"
              echo '```'
            } > docs/atk-power-terminology-migration-failure.md
            git add docs/atk-power-terminology-migration-failure.md
            git commit -m "Report ATK Power migration workflow failure"
            git push origin HEAD:Gacha
            exit 0
          fi

          cat >> docs/atk-power-terminology-migration.md <<'EOF'

          ## Execution result

          - Repository-wide terminology validation: passed
          - Production Vite build: passed
          - Internal `pow` compatibility assertions: passed
          EOF

          rm -f docs/atk-power-terminology-migration-failure.md
          rm -f scripts/atk_power_migration.py .github/workflows/atk-power-migration.yml
          rmdir scripts 2>/dev/null || true
          git add -A
          git diff --cached --stat
          git commit -m "Migrate visible stat terminology to ATK and Power"
          git push origin HEAD:Gacha
