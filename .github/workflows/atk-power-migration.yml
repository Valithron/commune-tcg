name: One-time ATK and Power terminology migration

on:
  push:
    branches:
      - Gacha
    paths:
      - .github/workflows/atk-power-migration.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: atk-power-terminology-migration
  cancel-in-progress: false

jobs:
  migrate-build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Gacha
        uses: actions/checkout@v4
        with:
          ref: Gacha
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run terminology migration
        run: python3 scripts/atk_power_migration.py

      - name: Install build dependencies
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Build production app
        run: npm run build

      - name: Record successful validation
        run: |
          cat >> docs/atk-power-terminology-migration.md <<'EOF'

          ## Execution result

          - Repository-wide terminology validation: passed
          - Production Vite build: passed
          - Internal `pow` compatibility assertions: passed
          EOF

      - name: Validate patch formatting
        run: git diff --check

      - name: Commit and publish migration
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -f scripts/atk_power_migration.py .github/workflows/atk-power-migration.yml
          rmdir scripts 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "Migrate visible stat terminology to ATK and Power"
          git push origin HEAD:Gacha
